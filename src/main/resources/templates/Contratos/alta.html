<!DOCTYPE html> <html xmlns:th="http://www.thymeleaf.org"> 
	<head> <meta charset="UTF-8"> 
		<title>Alta de Contrato</title> 
		<link rel="stylesheet" th:href="@{/css/main.css}" /> 
	</head> 
	<body>

		<div class="principal">

		    <h1>Alta de Contrato</h1>

		    <div th:if="${error}">
		        <p th:text="${error}"></p>
		    </div>

		    <form th:action="@{/contratos/guardar}" th:object="${contrato}" method="post">

		        <div>
		            <label>ID:</label>
		            <input type="text" th:value="${contrato.id}" readonly placeholder="Autogenerado">
		        </div>

		        <br>

		        <div>
		            <label>Propiedad:</label>
		            <select th:field="*{propiedad}">
		                <option value="">Seleccione una propiedad</option>
		                <option th:each="p : ${propiedades}" th:value="${p.id}"
		                        th:text="${p.direccion + ' - ' + (p.ciudad != null ? p.ciudad.nombre : '')}">
		                </option>
		            </select>
		            <span th:if="${#fields.hasErrors('propiedad')}" th:errors="*{propiedad}"></span>
		        </div>

		        <br>

		        <div>
		            <label>Inquilino:</label>
		            <select th:field="*{inquilino}">
		                <option value="">Seleccione un inquilino</option>
		                <option th:each="i : ${inquilinos}" th:value="${i.id}"
		                        th:text="${i.nombre + ' ' + i.apellido}">
		                </option>
		            </select>
		            <span th:if="${#fields.hasErrors('inquilino')}" th:errors="*{inquilino}"></span>
		        </div>

		        <br>

		        <div>
		            <label>Fecha de Inicio:</label>
		            <input type="datetime-local" th:field="*{fechaInicio}">
		            <span th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></span>
		        </div>

		        <br>

		        <div>
		            <label>Duración (meses):</label>
		            <input type="number" min="1" th:field="*{duracionMeses}">
		            <span th:if="${#fields.hasErrors('duracionMeses')}" th:errors="*{duracionMeses}"></span>
		        </div>

		        <br>

		        <div>
		            <label>Importe Mensual:</label>
		            <input type="number" step="0.01" min="0.01" th:field="*{importeMensual}">
		            <span th:if="${#fields.hasErrors('importeMensual')}" th:errors="*{importeMensual}"></span>
		        </div>

		        <br>

		        <div>
		            <label>Día de Vencimiento Mensual:</label>
		            <input type="date" th:field="*{diaVencMensual}">
		            <span th:if="${#fields.hasErrors('diaVencMensual')}" th:errors="*{diaVencMensual}"></span>
		            <small>Se usará el día del mes de la fecha seleccionada.</small>
		        </div>

		        <br>

		        <div>
		            <label>Descripción:</label>
		            <textarea th:field="*{descripcion}"></textarea>
		            <span th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
		        </div>

		        <br>

		        <button type="submit">Guardar</button>

		    </form>

		    <br>

		    <div class="menu">
		        <button type="button" onclick="location.href='/'">Inicio</button>

		        <button type="button" onclick="location.href='/contratos'">Gestionar Contratos</button>

		        <button type="button" onclick="location.href='/contratos/buscar'">Buscar Contratos</button>
		    </div>

		</div>
		</body>
		</html>
