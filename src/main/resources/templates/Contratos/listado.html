<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Listado de Contratos</title>
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
  <div class="principal">
    <h1>Contratos</h1>

    <div th:if="${error}">
      <p th:text="${error}"></p>
    </div>

    <br />

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Propiedad</th>
          <th>Propietario</th>
          <th>Inquilino</th>
          <th>Fecha Inicio</th>
          <th>Importe Mensual</th>
          <th>Día Vencimiento</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(contratos)}">
        <td colspan="9" style="text-align:center; color:gray;">
          Todavía no se han creado contratos.
        </td>
      </tr>
        <tr th:each="c : ${contratos}">
          <td th:text="${c.id}">1</td>
          <td th:text="${c.propiedad != null ? c.propiedad.direccion : ''}">Propiedad</td>
          <td
            th:text="${c.propiedad != null && c.propiedad.propietario != null ? c.propiedad.propietario.nombre + ' ' + c.propiedad.propietario.apellido : ''}">
            Propietario</td>
          <td th:text="${c.inquilino != null ? c.inquilino.nombre + ' ' + c.inquilino.apellido : ''}">Inquilino</td>
          <td th:text="${#temporals.format(c.fechaInicio, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</td>
          <td th:text="${c.importeMensual}">0.00</td>
          <td th:text="${c.diaVencMensual}">01</td>
          <td>
            <span th:if="${c.estadoContrato != null}"
                  th:class="'badge-' + ${c.estadoContrato}"
                  th:text="${c.estadoContrato}">
            </span>
          </td>
          <td>
            <a th:href="@{'/contratos/editar/' + ${c.id}}">Editar</a>
            &nbsp;|&nbsp;
            <a th:href="@{'/contratos/eliminar/' + ${c.id}}"
              onclick="return confirm('¿Eliminar contrato?')">Eliminar</a>
          </td>
        </tr>
      </tbody>
    </table>

    <br />
    <div class="menu">
      <button type="button" onclick="location.href='/'">Inicio</button>
      <button type="button" onclick="location.href='/contratos/nuevo'">Nuevo Contrato</button>
      <button type="button" onclick="location.href='/contratos/buscar'">Búsqueda Avanzada</button>
    </div>
  </div>
</body>

</html>
