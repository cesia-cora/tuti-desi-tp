<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Facturas</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
    <div class="contenedor-principal">
        <h1>Listado de Facturas</h1>
        
        <div class="acciones-top">
            <button type="button" onclick="window.location.href='/facturas/nueva'">+ Generar Nueva Factura</button>
            <button type="button" onclick="window.location.href='/'">Volver al Menú</button>
        </div>

        <div th:if="${error}" class="alerta-error">
            <p th:text="${error}"></p>
        </div>
        <div th:if="${exito}" class="alerta-exito">
            <p th:text="${exito}"></p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Concepto</th>
                    <th>Importe</th>
                    <th>Emisión</th>
                    <th>Vencimiento</th>
                    <th>Estado</th>
                    <th>Contrato ID</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="f : ${facturas}">
                    <td th:text="${f.id}"></td>
                    <td th:text="${f.concepto}"></td>
                    <td th:text="'$' + ${f.importe}"></td>
                    <td th:text="${#temporals.format(f.fechaEmision, 'dd/MM/yyyy')}"></td>
                    <td th:text="${#temporals.format(f.fechaVencimiento, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span th:class="'badge badge-' + ${f.estadoFactura}" th:text="${f.estadoFactura}"></span>
                    </td>
                    <td th:text="${f.contrato.id}"></td>
                    <td>
                        <a th:if="${f.estadoFactura.name() == 'PENDIENTE'}" 
                           th:href="@{/facturas/pagar/{id}(id=${f.id})}" class="btn-tabla btn-pagar">Pagar</a>
                        
                        <a th:if="${f.estadoFactura.name() == 'PENDIENTE'}" 
                           th:href="@{/facturas/anular/{id}(id=${f.id})}" 
                           class="btn-tabla btn-anular" 
                           onclick="return confirm('¿Seguro que desea anular esta factura?');">Anular</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(facturas)}">
                    <td colspan="8" style="text-align: center;">No hay facturas registradas.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
