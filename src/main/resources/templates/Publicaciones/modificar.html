<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modificar Publicación</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>

    <div class="principal">
        <h1>Editar Publicación</h1>

        <div th:if="${error}" style="color: red; font-weight: bold; margin-bottom: 15px;">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/publicaciones/guardar}" th:object="${publicacion}" method="post">
            
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{propiedad}">

            <div>
                <label>ID Publicación (Solo Lectura):</label>
                <input type="text" th:value="${publicacion.id}" readonly>
            </div>

            <br>

            <div>
                <label>Propiedad Asociada (Inmutable):</label>
                <input type="text" th:value="${publicacion.propiedad.direccion + ' - ' + publicacion.propiedad.ciudad.nombre}" disabled style="width: 300px;">
            </div>

            <br>

            <div>
                <label>Precio Mensual de Alquiler ($):</label>
                <input type="number" step="0.01" th:field="*{precioMensual}">
                <span style="color:red;" th:if="${#fields.hasErrors('precioMensual')}" th:errors="*{precioMensual}"></span>
            </div>

            <br>

            <div>
                <label>Fecha de Publicación:</label>
                <input type="date" th:field="*{fechaPublicacion}">
                <span style="color:red;" th:if="${#fields.hasErrors('fechaPublicacion')}" th:errors="*{fechaPublicacion}"></span>
            </div>

            <br>

            <div>
                <label>Estado de la Publicación:</label>
                <select th:field="*{estadoPublicacion}">
                    <option th:each="est : ${allEstadosPublicacion}" th:value="${est}" th:text="${est}"></option>
                </select>
                <span style="color:red;" th:if="${#fields.hasErrors('estadoPublicacion')}" th:errors="*{estadoPublicacion}"></span>
            </div>

            <br>

            <div>
                <label>Condiciones de Alquiler:</label>
                <br>
                <textarea th:field="*{condicionesAlquiler}" rows="4" cols="50"></textarea>
                <br>
                <span style="color:red;" th:if="${#fields.hasErrors('condicionesAlquiler')}" th:errors="*{condicionesAlquiler}"></span>
            </div>

            <br>

            <div>
                <label>Descripción:</label>
                <br>
                <textarea th:field="*{descripcion}" rows="4" cols="50"></textarea>
                <br>
                <span style="color:red;" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
            </div>

            <br>

            <button type="submit">Guardar Cambios</button>
        </form>

        <br>

        <div class="menu">
            <button type="button" onclick="location.href='/'">Inicio</button>
            <button type="button" onclick="location.href='/publicaciones'">Cancelar</button>
        </div>
    </div>

</body>
</html>
