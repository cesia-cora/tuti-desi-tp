<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Publicación</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>

    <div class="principal">
        <h1>Nueva Publicación de Alquiler</h1>

        <div th:if="${error}" style="color: red; font-weight: bold; margin-bottom: 15px;">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/publicaciones/guardar}" th:object="${publicacion}" method="post">

            <div>
                <label>ID:</label>
                <input type="text" th:value="${publicacion.id}" placeholder="Autogenerado" readonly>
            </div>

            <br>

            <div>
                <label>Propiedad Disponible:</label>
                <select th:field="*{propiedad}">
                    <option value="">Seleccione una propiedad activa</option>
                    <option th:each="p : ${allPropiedades}" 
                            th:value="${p.id}" 
                            th:text="${p.direccion + ' - ' + p.ciudad.nombre + ' (' + p.estadoDisponibilidad + ')'}">
                    </option>
                </select>
                <span style="color:red;" th:if="${#fields.hasErrors('propiedad')}" th:errors="*{propiedad}"></span>
            </div>

            <br>

            <div>
                <label>Precio Mensual de Alquiler ($):</label>
                <input type="number" step="0.01" th:field="*{precioMensual}">
                <span style="color:red;" th:if="${#fields.hasErrors('precioMensual')}" th:errors="*{precioMensual}"></span>
            </div>

            <br>

            <div>
                <label>Fecha de Publicación:</label>
                <input type="date" th:field="*{fechaPublicacion}">
                <span style="color:red;" th:if="${#fields.hasErrors('fechaPublicacion')}" th:errors="*{fechaPublicacion}"></span>
            </div>

            <br>

            <div>
                <label>Condiciones de Alquiler (Depósito, Garantía, Mascotas, etc.):</label>
                <br>
                <textarea th:field="*{condicionesAlquiler}" rows="4" cols="50"></textarea>
                <br>
                <span style="color:red;" th:if="${#fields.hasErrors('condicionesAlquiler')}" th:errors="*{condicionesAlquiler}"></span>
            </div>

            <br>

            <div>
                <label>Descripción de la Publicación:</label>
                <br>
                <textarea th:field="*{descripcion}" rows="4" cols="50"></textarea>
                <br>
                <span style="color:red;" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
            </div>

            <br>

            <button type="submit">Publicar Propiedad</button>
        </form>

        <br>

        <div class="menu">
            <button type="button" onclick="location.href='/'">Inicio</button>
            <button type="button" onclick="location.href='/publicaciones'">Gestionar Publicaciones</button>
        </div>
    </div>

</body>
</html>
