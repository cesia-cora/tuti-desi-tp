<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Generar Factura</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
    <div class="contenedor-principal">
        <h1>Generar Nueva Factura Manual</h1>

        <div th:if="${error}" class="alerta-error">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/facturas/guardar}" th:object="${factura}" method="post" class="formulario">
            <div class="grupo-form">
                <label for="contrato">Seleccionar Contrato Vigente:</label>
                <select id="contrato" th:field="*{contrato}" required>
                    <option value="">-- Seleccione un Contrato --</option>
                    <option th:each="c : ${contratos}" th:value="${c.id}" 
                            th:text="'Contrato #' + ${c.id} + ' - Inquilino: ' + ${c.inquilino.nombre} + ' ' + ${c.inquilino.apellido}"></option>
                </select>
            </div>

            <div class="grupo-form">
                <label for="concepto">Concepto de la Factura:</label>
                <input type="text" id="concepto" th:field="*{concepto}" placeholder="Ej: Alquiler de Julio 2026" required />
            </div>

            <div class="grupo-form">
                <label for="importe">Importe ($):</label>
                <input type="number" id="importe" th:field="*{importe}" step="0.01" min="1" placeholder="0.00" required />
            </div>

            <div class="grupo-form">
                <label for="fechaEmision">Fecha de Emisión:</label>
                <input type="date" id="fechaEmision" th:field="*{fechaEmision}" required />
            </div>

            <div class="grupo-form">
                <label for="fechaVencimiento">Fecha de Vencimiento:</label>
                <input type="date" id="fechaVencimiento" th:field="*{fechaVencimiento}" required />
            </div>

            <div class="botones-form">
                <button type="submit" class="btn-guardar">Generar Factura</button>
                <button type="button" class="btn-cancelar" onclick="window.location.href='/facturas'">Cancelar</button>
            </div>
        </form>
    </div>
</body>
</html>
