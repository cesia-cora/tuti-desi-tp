<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Pago</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
    <div class="contenedor-principal">
        <h1>Registrar Pago de Factura</h1>

        <div th:if="${error}" class="alerta-error">
            <p th:text="${error}"></p>
        </div>

        <div class="info-factura">
            <p><strong>Factura ID:</strong> <span th:text="${facturaId}"></span></p>
            <p><strong>Concepto:</strong> <span th:text="${concepto}"></span></p>
            <p><strong>Monto Obligatorio a Pagar:</strong> <span style="color: var(--color-primario); font-weight: bold;" th:text="'$' + ${importeOriginal}"></span></p>
        </div>

        <form th:action="@{/facturas/procesar-pago}" method="post" class="formulario">
            <input type="hidden" name="facturaId" th:value="${facturaId}" />

            <div class="grupo-form">
                <label for="importePagado">Confirmar Importe a Pagar ($):</label>
                <input type="number" id="importePagado" name="importePagado" step="0.01" th:placeholder="${importeOriginal}" required />
            </div>

            <div class="grupo-form">
                <label for="medioPago">Medio de Pago:</label>
                <select id="medioPago" name="medioPago" required>
                    <option value="">-- Seleccione un medio --</option>
                    <option th:each="medio : ${mediosPago}" th:value="${medio}" th:text="${medio}"></option>
                </select>
            </div>

            <div class="grupo-form">
                <label for="fechaPago">Fecha en la que se realiza el Pago:</label>
                <input type="date" id="fechaPago" name="fechaPago" required />
            </div>

            <div class="botones-form">
                <button type="submit" class="btn-guardar">Registrar Pago</button>
                <button type="button" class="btn-cancelar" onclick="window.location.href='/facturas'">Cancelar</button>
            </div>
        </form>
    </div>
</body>
</html>
